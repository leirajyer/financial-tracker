<div id="payee-list" hx-swap-oob="true" class="grid gap-2">
    {% for payee in payees %}
    <div
        class="flex items-center justify-between p-4 bg-white rounded-xl border border-slate-50 group transition-all hover:border-emerald-100">
        <span class="text-sm font-bold text-slate-700">{{ payee.name }}</span>

        <div class="flex gap-2">
            <button onclick="document.getElementById('edit-payee-modal-{{ payee.id }}').classList.remove('hidden')" class="text-slate-300 hover:text-blue-400 transition-all shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
            <button hx-delete="/settings/delete-payee/{{ payee.id }}" hx-confirm="Remove this payee?" hx-swap="none"
                class="text-slate-300 hover:text-red-400 transition-all shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Edit Modal for Payee -->
    <div id="edit-payee-modal-{{ payee.id }}" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs md:max-w-sm rounded-xl p-8 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">Edit Payee</h2>
                <button onclick="document.getElementById('edit-payee-modal-{{ payee.id }}').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 font-bold">✕</button>
            </div>
            <form action="/settings/edit-payee/{{ payee.id }}" method="POST" class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <input type="text" name="name" value="{{ payee.name }}" required class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold text-sm" placeholder="Payee Name">
                </div>
                <button type="submit" class="w-full py-3.5 bg-emerald-600 text-white rounded-xl text-sm font-black hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100 mt-2">SAVE CHANGES</button>
            </form>
        </div>
    </div>
    {% else %}
    <div class="text-center py-10 bg-slate-50 rounded-xl border border-dashed border-slate-200">
        <p class="text-xs text-slate-400 italic font-medium">No payees registered.</p>
    </div>
    {% endfor %}
</div>
