<form hx-post="/add-cashflow" hx-swap="none" hx-indicator="#cashflow-spinner"
    hx-on::after-request="if(event.detail.successful) window.location.href='/cashflow'" class="space-y-6">

    <div class="mb-8">
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 text-center">
            What kind of transaction?
        </label>
        <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-2xl">
            <label class="relative cursor-pointer">
                <input type="radio" name="type" value="expense" class="peer sr-only" checked>
                <div
                    class="peer-checked:bg-white peer-checked:text-rose-600 peer-checked:shadow-sm py-3 rounded-xl text-center text-sm font-black text-slate-500 transition-all uppercase tracking-tighter">
                    💸 Expense
                </div>
            </label>
            <label class="relative cursor-pointer">
                <input type="radio" name="type" value="income" class="peer sr-only">
                <div
                    class="peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm py-3 rounded-xl text-center text-sm font-black text-slate-500 transition-all uppercase tracking-tighter">
                    💰 Income
                </div>
            </label>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Amount</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black text-xl">₱</span>
                <input type="number" step="0.01" name="amount" inputmode="decimal" required placeholder="0.00"
                    class="w-full border-2 border-slate-100 p-4 pl-10 rounded-2xl focus:border-emerald-500 outline-none text-2xl font-black text-slate-800" />
            </div>
        </div>

        <div class="md:col-span-2">
            <label
                class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Description</label>
            <input type="text" name="description" placeholder="Where did this go?" required
                class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-emerald-500 outline-none font-bold" />
        </div>

        <div class="md:col-span-2">
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 text-center">
                Select Category
            </label>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                {% for cat in categories %}
                <label class="relative cursor-pointer">
                    <input type="radio" name="category_id" value="{{ cat.id }}" class="peer sr-only" required>

                    <div class="h-full px-3 py-4 rounded-2xl border-2 border-slate-100 text-[11px] font-black text-slate-500 transition-all 
                        peer-checked:border-slate-900 peer-checked:bg-slate-900 peer-checked:text-white
                        hover:bg-slate-50 flex flex-col items-center justify-center gap-2 text-center leading-tight">

                        <span class="w-3 h-3 rounded-full shadow-sm" style="background-color: {{ cat.color }}"></span>

                        {{ cat.name }}
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Date</label>
            <input type="date" name="date" value="{{ now.strftime('%Y-%m-%d') }}" required
                class="w-full border-2 border-slate-100 p-4 rounded-2xl focus:border-emerald-500 outline-none font-bold" />
        </div>
    </div>

    <div class="pt-6">
        <button type="submit"
            class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black transition-all shadow-xl active:scale-95 flex justify-center items-center gap-3">
            <span>SAVE TRANSACTION</span>
            <div id="cashflow-spinner"
                class="htmx-indicator animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full">
            </div>
        </button>
    </div>
</form>
