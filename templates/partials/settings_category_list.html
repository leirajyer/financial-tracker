{% for cat in categories %}
<div class="flex items-center justify-between p-3 bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full" style="background-color: {{ cat.color }}"></div>
        <span class="text-xs font-bold text-slate-700">{{ cat.name }}</span>
    </div>
    <div class="flex gap-2">
        <button onclick="document.getElementById('edit-cat-modal-{{ cat.id }}').classList.remove('hidden')" class="text-slate-300 hover:text-blue-400 transition-all shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        </button>
        <button hx-delete="/settings/delete-category/{{ cat.id }}" hx-confirm="Remove this category?" hx-target="closest div.flex.items-center.justify-between"
            hx-swap="outerHTML" class="text-slate-300 hover:text-red-400 transition-all shrink-0"><svg
                xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>
</div>

<div id="edit-cat-modal-{{ cat.id }}" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-xs md:max-w-sm rounded-[2.5rem] p-8 shadow-2xl relative">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-slate-800 tracking-tight">Edit Category</h2>
            <button onclick="document.getElementById('edit-cat-modal-{{ cat.id }}').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 font-bold">✕</button>
        </div>
        <form action="/settings/edit-category/{{ cat.id }}" method="POST" class="flex flex-col gap-4">
            <div class="flex gap-2 items-center">
                <input type="color" name="color" value="{{ cat.color }}" class="w-12 h-12 p-1 bg-white border border-slate-100 rounded-xl cursor-pointer shrink-0">
                <input type="text" name="name" value="{{ cat.name }}" required class="flex-1 p-3 bg-slate-50 border-none rounded-xl font-bold text-xs" placeholder="Category Name">
            </div>
            <button type="submit" class="w-full py-3 bg-purple-600 text-white rounded-2xl text-sm font-black hover:bg-purple-700 transition-all shadow-lg shadow-purple-100 mt-2">SAVE CHANGES</button>
        </form>
    </div>
</div>
{% else %}
<p class="col-span-2 text-center py-4 text-slate-400 text-[10px] font-bold uppercase tracking-widest">No categories yet
</p>
{% endfor %}
