<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Salapi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo Area -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-xl shadow-indigo-100 mb-4">
                <span class="text-2xl">💰</span>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">Salapi</h1>
            <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Personal Finance Tracker</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-white">
            <h2 class="text-xl font-black text-slate-800 mb-8 tracking-tight">Welcome Back</h2>
            
            {% if request.query_params.get('msg') %}
                <div class="mb-6 p-4 bg-emerald-50 text-emerald-600 rounded-2xl text-xs font-bold border border-emerald-100">
                    {{ request.query_params.get('msg') }}
                </div>
            {% endif %}

            {% if error %}
                <div class="mb-6 p-4 bg-rose-50 text-rose-600 rounded-2xl text-xs font-bold border border-rose-100">
                    {{ error }}
                </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Username</label>
                    <input type="text" name="username" required
                        class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-indigo-500 transition-all outline-none text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Password</label>
                    <input type="password" name="password" required
                        class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-indigo-500 transition-all outline-none text-slate-700">
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full bg-slate-900 text-white p-5 rounded-[1.5rem] font-black text-sm uppercase shadow-xl hover:bg-indigo-600 transition-all duration-300 active:scale-[0.98]">
                        Sign In
                    </button>
                </div>

                <div class="relative flex py-5 items-center">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="flex-shrink mx-4 text-[10px] font-black text-slate-300 uppercase tracking-widest">or</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <a href="/login/google" 
                    class="w-full bg-white text-slate-700 p-5 rounded-[1.5rem] font-black text-sm uppercase shadow-lg border border-slate-100 hover:bg-slate-50 transition-all duration-300 flex items-center justify-center gap-3 active:scale-[0.98]">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 1.2-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </a>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 text-xs font-bold">
                    Don't have an account? 
                    <a href="/register" class="text-indigo-600 hover:text-slate-900 transition-colors">Create one</a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2024 Salapi. Crafted with ❤️ for your wealth.
        </p>
    </div>
</body>
</html>
