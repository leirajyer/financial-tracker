<div id="settingsModal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black text-slate-800 tracking-tight">System Settings</h2>
            <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-600 font-bold">✕</button>
        </div>

        <div class="space-y-8 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">

            <section class="space-y-4">
                <form action="/settings/add-card" method="POST" class="space-y-2">
                    <label class="block text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em]">Manage
                        Cards</label>
                    <div class="flex gap-2">
                        <input type="color" name="color" value="#6366f1"
                            class="w-10 h-10 p-1 bg-white border border-slate-100 rounded-xl cursor-pointer">
                        <input type="text" name="name" placeholder="Add Card..." required
                            class="flex-1 p-3 bg-slate-50 border-none rounded-xl font-bold text-xs">
                        <button type="submit"
                            class="bg-slate-900 text-white px-4 rounded-xl font-black text-[10px] uppercase">+</button>
                    </div>
                </form>
                <div class="grid grid-cols-1 gap-1">
                    {% for card in cards %}
                    <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-lg group">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full" style="background-color: {{ card.color }}"></div>
                            <span class="text-xs font-bold text-slate-600">{{ card.name }}</span>
                        </div>
                        <form action="/settings/delete-card/{{ card.id }}" method="POST"
                            onsubmit="return confirm('Delete this card?')">
                            <button type="submit"
                                class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all">
                                <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                        clip-rule="evenodd" />
                                </svg>
                            </button>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </section>

            <section class="space-y-4 border-t border-slate-50 pt-6">
                <form action="/settings/add-category" method="POST" class="space-y-2">
                    <label class="block text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em]">Manage
                        Categories</label>
                    <div class="flex gap-2">
                        <input type="color" name="color" value="#10b981"
                            class="w-10 h-10 p-1 bg-white border border-slate-100 rounded-xl cursor-pointer">
                        <input type="text" name="name" placeholder="Add Category..." required
                            class="flex-1 p-3 bg-slate-50 border-none rounded-xl font-bold text-xs">
                        <button type="submit"
                            class="bg-slate-900 text-white px-4 rounded-xl font-black text-[10px] uppercase">+</button>
                    </div>
                </form>
                <div class="grid grid-cols-1 gap-1">
                    {% for cat in categories %}
                    <div class="flex justify-between items-center p-2 hover:bg-slate-50 rounded-lg group">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full" style="background-color: {{ cat.color }}"></div>
                            <span class="text-xs font-bold text-slate-600">{{ cat.name }}</span>
                        </div>
                        <form action="/settings/delete-category/{{ cat.id }}" method="POST"
                            onsubmit="return confirm('Delete this category?')">
                            <button type="submit"
                                class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500">
                                <svg class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" />
                                </svg>
                            </button>
                        </form>
                    </div>
                    {% endfor %}
                </div>
            </section>
        </div>
    </div>
</div>
