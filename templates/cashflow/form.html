{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-3xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Add Transaction</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Cashflow Ledger</p>
    </div>

    <form action="/cashflow/add" method="POST" class="space-y-6">
        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm space-y-6">
            <div class="w-full">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Amount</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₱</span>
                    <input type="number" step="0.01" name="amount" required placeholder="0.00"
                        class="w-full pl-8 pr-4 py-4 bg-slate-50 border-none rounded-xl text-2xl font-black focus:ring-2 focus:ring-emerald-500 transition-all">
                </div>
            </div>

            <div class="w-full">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Transaction Type</label>
                <div class="grid grid-cols-2 gap-2 p-1.5 bg-slate-100 rounded-xl">
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type" value="income" class="peer sr-only" checked>
                        <div class="py-3 text-center rounded-xl font-bold text-sm transition-all
                    text-slate-500 peer-checked:bg-white peer-checked:text-emerald-500 peer-checked:shadow-sm">
                            💰 Income
                        </div>
                    </label>
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type" value="expense" class="peer sr-only">
                        <div class="py-3 text-center rounded-xl font-bold text-sm transition-all
                    text-slate-500 peer-checked:bg-white peer-checked:text-rose-500 peer-checked:shadow-sm">
                            💸 Expense
                        </div>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-3">Category</label>
                <div class="flex flex-wrap gap-2">
                    {% for cat in categories %}
                    <label class="cursor-pointer">
                        <input type="radio" name="category_id" value="{{ cat.id }}" class="peer sr-only">
                        <div class="px-4 py-2 rounded-xl border border-slate-200 text-xs font-bold text-slate-500 transition-all
                            peer-checked:text-white peer-checked:border-transparent"
                            style="--cat-color: {{ cat.color }}">
                            {{ cat.name }}
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Description</label>
                <input type="text" name="description" placeholder="What was this for?" required
                    class="w-full p-4 bg-slate-50 border-none rounded-xl font-medium focus:ring-2 focus:ring-emerald-500">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Date</label>
                <input type="date" name="date" value="{{ today }}"
                    class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold focus:ring-2 focus:ring-emerald-500">
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-3">
            <button type="submit"
                class="flex-1 bg-slate-900 text-white p-5 rounded-xl font-black text-sm tracking-widest hover:bg-emerald-600 transition-all shadow-xl shadow-slate-200 uppercase">
                Save Transaction
            </button>

            <a href="/"
                class="flex-1 bg-slate-100 text-slate-500 p-5 rounded-xl font-black text-sm tracking-widest hover:bg-slate-200 transition-all text-center uppercase">
                Cancel
            </a>
        </div>
    </form>
</div>

<style>
    input[name="category_id"]:checked+div[style*="--cat-color"] {
        background-color: var(--cat-color);
        box-shadow: 0 4px 12px -2px var(--cat-color);
    }
</style>
{% endblock %}
