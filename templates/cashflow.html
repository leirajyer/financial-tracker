{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto p-6">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Cashflow</h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                Income & Variable Expenses
            </p>
        </div>

        <div class="flex gap-3">
            <a href="/cashflow/add"
                class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-sm hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i>
                NEW TRANSACTION
            </a>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Monthly Income</p>
            <p id="total-income-stat" class="text-xl font-black text-emerald-600">₱0.00</p>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Monthly Expenses</p>
            <p id="total-expense-stat" class="text-xl font-black text-rose-500">₱0.00</p>
        </div>
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Net Cashflow</p>
            <p id="net-cashflow-stat" class="text-xl font-black text-slate-800">₱0.00</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-50 flex justify-between items-center">
            <h3 class="font-black text-slate-800 uppercase text-xs tracking-tighter">Recent Transactions</h3>
            <span class="text-[10px] text-slate-400 font-bold uppercase">Last 20 entries</span>
        </div>

        <div id="cashflow-list">
            {% include "partials/cashflow_list.html" %}
        </div>
    </div>
</div>
{% endblock %}
