{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto p-4 md:p-8">
    <div class="flex items-center gap-4 mb-8">
        <a href="/cashflow" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
            <i class="fa-solid fa-arrow-left text-xl"></i>
        </a>
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Add Transaction</h1>
            <p class="text-slate-500 font-bold uppercase text-[9px] tracking-widest">New Cash Entry</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 p-6 md:p-10">
        {% include "partials/cashflow_form.html" %}
    </div>

    <div class="mt-8 text-center">
        <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">
            Transactions update your monthly freedom balance instantly
        </p>
    </div>
</div>
{% endblock %}
