{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">

    <div class="flex flex-col gap-1 mb-2">
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Financial Pulse</h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Homepage Dashboard</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h3 class="font-black text-slate-800 uppercase text-[10px] tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-bolt text-emerald-500"></i> Recent Activity
                </h3>
                <a href="/cashflow" class="text-[10px] text-emerald-600 font-bold uppercase hover:underline">View
                    All</a>
            </div>
            <div class="p-2">
                {% include "cashflow/summary.html" %}
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h3 class="font-black text-slate-800 uppercase text-[10px] tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-credit-card text-indigo-500"></i> Credit Pulse
                </h3>
                <a href="/installment"
                    class="text-[10px] text-indigo-600 font-bold uppercase hover:underline">Manage</a>
            </div>
            <div class="p-2">
                {% include "installment/summary.html" %}
            </div>
        </div>

    </div>
</div>
{% endblock %}
