{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-5xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">New Installment</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Credit Pulse Tracking</p>
    </div>

    <form action="/installments/add" method="POST" class="space-y-6">
        <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm space-y-6">

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Item Description</label>
                <input type="text" name="item_name" placeholder="e.g., MacBook M3 Pro" required
                    class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Source Card</label>
                        <a href="/settings/#cards" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-widest transition-colors">+ Add</a>
                    </div>
                    <div class="relative group">
                        <select name="card_id" required
                            class="w-full appearance-none bg-slate-50 border-none rounded-xl p-4 pr-12 font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="" disabled selected>Select Card</option>
                            {% for card in cards %}
                            <option value="{{ card.id }}">{{ card.name }}</option>
                            {% endfor %}
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400 group-focus-within:text-indigo-500">
                            <svg class="h-5 w-5 fill-current" viewBox="0 0 20 20">
                                <path
                                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</label>
                        <a href="/settings/#categories" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-widest transition-colors">+ Add</a>
                    </div>
                    <div class="relative group">
                        <select name="category_id" required
                            class="w-full appearance-none bg-slate-50 border-none rounded-xl p-4 pr-12 font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="" disabled selected>Select Category</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400 group-focus-within:text-indigo-500">
                            <svg class="h-5 w-5 fill-current" viewBox="0 0 20 20">
                                <path
                                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Payee</label>
                        <a href="/settings/#payees" class="text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase tracking-widest transition-colors">+ Add</a>
                    </div>
                    <div class="relative group">
                        <select name="payee_id" required
                            class="w-full appearance-none bg-slate-50 border-none rounded-xl p-4 pr-12 font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="" disabled selected>Select Payee</option>
                            {% for p in payees %}
                            <option value="{{ p.id }}">{{ p.name }}</option>
                            {% endfor %}
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400 group-focus-within:text-indigo-500">
                            <svg class="h-5 w-5 fill-current" viewBox="0 0 20 20">
                                <path
                                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                            </svg>
                        </div>
                    </div>
                </div>

            </div>

            <div class="space-y-6 pt-4 border-t border-slate-50">


                <div class="space-y-6 pt-4 border-t border-slate-50">

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Total
                            Principal</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₱</span>
                            <input type="number" step="0.01" name="total_amount" required placeholder="0.00"
                                class="w-full pl-8 pr-4 py-4 bg-slate-50 border-none rounded-xl text-xl font-black focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Payment
                                Terms</label>
                            <div class="relative group">
                                <select name="months" required
                                    class="w-full appearance-none bg-slate-50 border-none rounded-xl p-4 pr-12 font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                                    {% for term in payment_terms %}
                                    <option value="{{ term.value }}" {% if term.value==12 %}selected{% endif %}>
                                        {{ term.label }}
                                    </option>
                                    {% endfor %}
                                </select>
                                <div
                                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-6 text-slate-400 group-focus-within:text-indigo-500">
                                    <svg class="h-5 w-5 fill-current" viewBox="0 0 20 20">
                                        <path
                                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Start
                                Month</label>
                            <input type="month" name="start_date_str" value="{{ today_month }}" required
                                class="w-full p-4 bg-slate-50 border-none rounded-xl font-black text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>

                        <div class="space-y-2">
                            <label
                                class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Interest
                                Rate</label>
                            <div class="relative group">
                                <input type="number" step="0.01" min="0" name="interest_rate" value="0.00"
                                    class="w-full p-4 bg-slate-50 border-none rounded-xl font-black text-indigo-600 focus:ring-2 focus:ring-indigo-500 transition-all">
                                <span
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold pointer-events-none">%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-3">
            <button type="submit"
                class="flex-1 bg-slate-900 text-white p-5 rounded-xl font-black text-sm uppercase shadow-xl hover:bg-indigo-600 transition-all">
                Save Installment
            </button>
            <a href="/installments/"
                class="flex-1 bg-red-500 text-white p-5 rounded-xl font-black text-sm text-center uppercase transition-colors">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
