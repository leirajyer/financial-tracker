{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto p-4 md:p-8">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">New Installment</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Credit Pulse Tracking</p>
    </div>

    <form action="/installments/add" method="POST" class="space-y-6">
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Item Description</label>
                <input type="text" name="item_name" placeholder="e.g., MacBook M3 Pro" required
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-3">Source Card</label>
                <div class="flex flex-wrap gap-2">
                    {% for card in cards %}
                    <label class="cursor-pointer">
                        <input type="radio" name="card_id" value="{{ card.id }}" class="peer sr-only" required>
                        <div class="px-4 py-2 rounded-full border border-slate-200 text-xs font-bold text-slate-500 transition-all
                            peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600">
                            {{ card.name }}
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 mt-6">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Merchant / Payee</label>
                <div class="flex flex-wrap gap-2">
                    {% for p in payees %}
                    <label class="cursor-pointer">
                        <input type="radio" name="payee_id" value="{{ p.id }}" class="peer sr-only" required>
                        <div class="px-4 py-2 rounded-full border border-slate-200 text-xs font-bold text-slate-500 transition-all
                peer-checked:bg-slate-900 peer-checked:text-white peer-checked:border-slate-900 shadow-sm">
                            {{ p.name }}
                        </div>
                    </label>
                    {% endfor %}

                    <a href="/payees/add"
                        class="px-4 py-2 rounded-full border border-dashed border-slate-300 text-xs font-bold text-slate-400 hover:border-indigo-400 hover:text-indigo-500 transition-all">
                        + New Payee
                    </a>
                </div>
            </div>
            <div class="mt-6">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-3">Category</label>
                <div class="flex flex-wrap gap-2">
                    {% for cat in categories %}
                    <label class="cursor-pointer">
                        <input type="radio" name="category_id" value="{{ cat.id }}" class="peer sr-only" required>
                        <div class="px-4 py-2 rounded-full border border-slate-200 text-xs font-bold text-slate-500 transition-all
                peer-checked:text-white peer-checked:border-transparent" style="--cat-color: {{ cat.color }}">
                            {{ cat.name }}
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Total Principal</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₱</span>
                        <input type="number" step="0.01" name="total_amount" required placeholder="0.00"
                            class="w-full pl-8 pr-4 py-4 bg-slate-50 border-none rounded-2xl text-xl font-black">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Months</label>
                    <input type="number" name="months" value="12"
                        class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Start Month</label>
                    <input type="month" name="start_date_str" value="{{ today_month }}"
                        class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold">
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-3">
            <button type="submit"
                class="flex-1 bg-slate-900 text-white p-5 rounded-3xl font-black text-sm uppercase shadow-xl hover:bg-indigo-600 transition-all">
                Save Installment
            </button>
            <a href="/installments/"
                class="flex-1 bg-slate-100 text-slate-500 p-5 rounded-3xl font-black text-sm text-center uppercase">Cancel</a>
        </div>
    </form>
</div>
<style>
    input[name="category_id"]:checked+div[style*="--cat-color"] {
        background-color: var(--cat-color);
        box-shadow: 0 4px 12px -2px var(--cat-color);
    }
</style>
{% endblock %}
