services:
  db:
    image: postgres:15-alpine
    container_name: pesopulse_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pesopulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ✅ ADD THIS: Tells Docker how to check if Postgres is REALLY ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pesopulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pesopulse_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/pesopulse
    # ✅ UPDATE THIS: Tells the App to wait for the 'healthy' status
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
