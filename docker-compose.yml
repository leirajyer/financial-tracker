
services:
  db:
    image: postgres:15-alpine
    container_name: salapi_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: salapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d salapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: salapi_app
    # Set the context to where the app folder lives
    working_dir: /code
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/salapi
      PYTHONPATH: /code
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
      GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
      SECRET_KEY: "YOUR_SECRET_KEY"
      AUTHLIB_INSECURE_TRANSPORT: "true"
      GEMINI_API_KEY: "AIzaSyAduQcd38944tRx3BUMhI80jCzfUJQ4K98"
    # Use the 'module' syntax to run uvicorn
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
